<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @keyframes slideIn {
        from {
          opacity: 0;
          transform: translateY(20px) rotateX(-20deg);
        }
        to {
          opacity: 1;
          transform: translateY(0) rotateX(0deg);
        }
      }

      .logo-main {
        animation: slideIn 1.2s ease-out forwards;
        transform-style: preserve-3d;
      }
    </style>

    <!-- Gradient for main A -->
    <linearGradient id="purplePink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d946ef;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>

    <!-- Dark shadow gradient for 3D effect -->
    <linearGradient id="shadowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#000000;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:0.1" />
    </linearGradient>

    <!-- Light highlight for metallic effect -->
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.4" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:0.15" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>

    <!-- Clipping path for A shape -->
    <clipPath id="aShape">
      <path d="M 70 170 L 100 50 L 130 170 Z M 80 125 L 120 125 L 120 135 L 80 135 Z" />
    </clipPath>
  </defs>

  <g class="logo-main">
    <!-- Shadow/Depth layer (back) -->
    <g transform="translate(2, 4)">
      <path
        d="M 70 170 L 100 50 L 130 170 Z"
        fill="none"
        stroke="url(#shadowGrad)"
        stroke-width="14"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <line
        x1="80"
        y1="125"
        x2="120"
        y2="125"
        stroke="url(#shadowGrad)"
        stroke-width="14"
        stroke-linecap="round"
      />
    </g>

    <!-- Main A shape (front) with gradient -->
    <g>
      <!-- Left stroke -->
      <path
        d="M 70 170 L 100 50 L 130 170"
        fill="none"
        stroke="url(#purplePink)"
        stroke-width="14"
        stroke-linecap="round"
        stroke-linejoin="round"
      />

      <!-- Horizontal bar -->
      <line
        x1="80"
        y1="125"
        x2="120"
        y2="125"
        stroke="url(#purplePink)"
        stroke-width="14"
        stroke-linecap="round"
      />
    </g>

    <!-- Circuit Pattern Inside A -->
    <g clip-path="url(#aShape)" opacity="0.8">
      <!-- Vertical circuit lines -->
      <line x1="85" y1="60" x2="85" y2="100" stroke="url(#purplePink)" stroke-width="1.5" />
      <line x1="100" y1="55" x2="100" y2="120" stroke="url(#purplePink)" stroke-width="1.5" />
      <line x1="115" y1="65" x2="115" y2="110" stroke="url(#purplePink)" stroke-width="1.5" />

      <!-- Horizontal circuit lines -->
      <line x1="75" y1="80" x2="125" y2="80" stroke="url(#purplePink)" stroke-width="1.5" />
      <line x1="80" y1="100" x2="120" y2="100" stroke="url(#purplePink)" stroke-width="1.5" />

      <!-- Diagonal connections -->
      <line x1="80" y1="70" x2="100" y2="90" stroke="url(#purplePink)" stroke-width="1" opacity="0.6" />
      <line x1="100" y1="90" x2="120" y2="70" stroke="url(#purplePink)" stroke-width="1" opacity="0.6" />
      <line x1="85" y1="100" x2="115" y2="115" stroke="url(#purplePink)" stroke-width="1" opacity="0.6" />

      <!-- Circuit node points (small circles) -->
      <circle cx="85" cy="80" r="2" fill="url(#purplePink)" />
      <circle cx="100" cy="90" r="2" fill="url(#purplePink)" />
      <circle cx="115" cy="80" r="2" fill="url(#purplePink)" />
      <circle cx="100" cy="100" r="2" fill="url(#purplePink)" />
      <circle cx="90" cy="110" r="2" fill="url(#purplePink)" />
      <circle cx="110" cy="110" r="2" fill="url(#purplePink)" />

      <!-- Corner nodes -->
      <circle cx="80" cy="130" r="1.5" fill="url(#purplePink)" />
      <circle cx="100" cy="135" r="1.5" fill="url(#purplePink)" />
      <circle cx="120" cy="130" r="1.5" fill="url(#purplePink)" />
    </g>

    <!-- Metallic highlight (left side) -->
    <path
      d="M 72 168 L 100 55 L 108 165"
      fill="none"
      stroke="url(#highlight)"
      stroke-width="5"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.6"
    />

    <!-- Metallic highlight (right side) -->
    <path
      d="M 128 168 L 100 55 L 92 165"
      fill="none"
      stroke="url(#highlight)"
      stroke-width="4"
      stroke-linecap="round"
      stroke-linejoin="round"
      opacity="0.4"
    />

    <!-- Glow effect -->
    <g opacity="0.2">
      <path
        d="M 70 170 L 100 50 L 130 170"
        fill="none"
        stroke="#d946ef"
        stroke-width="20"
        stroke-linecap="round"
        stroke-linejoin="round"
        filter="blur(2px)"
      />
    </g>
  </g>
</svg>