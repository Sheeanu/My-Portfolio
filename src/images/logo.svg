<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Metallic Gradients -->
    <linearGradient id="metal1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="25%" stop-color="#a0a0a0" />
      <stop offset="50%" stop-color="#505050" />
      <stop offset="75%" stop-color="#c0c0c0" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>

    <linearGradient id="metal2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f0f0f0" />
      <stop offset="30%" stop-color="#707070" />
      <stop offset="60%" stop-color="#d0d0d0" />
      <stop offset="100%" stop-color="#303030" />
    </linearGradient>

    <linearGradient id="metal3" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#808080" />
      <stop offset="30%" stop-color="#ffffff" />
      <stop offset="70%" stop-color="#606060" />
      <stop offset="100%" stop-color="#b0b0b0" />
    </linearGradient>

    <!-- Bevel Highlights -->
    <linearGradient id="edgeHighlight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.1" />
    </linearGradient>

    <!-- Drop Shadow for 3D effect -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="3" dy="6" stdDeviation="4" flood-color="#000000" flood-opacity="0.6" />
    </filter>

    <style>
      @keyframes popIn {
        0% { opacity: 0; transform: scale(0.9) translateY(10px); }
        100% { opacity: 1; transform: scale(1) translateY(0); }
      }
      .logo-main {
        animation: popIn 1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
      .poly {
        stroke: url(#edgeHighlight);
        stroke-width: 1.5;
        stroke-linejoin: round;
      }
    </style>
  </defs>

  <g class="logo-main" filter="url(#shadow)">
    <!-- Top Left Block -->
    <polygon class="poly" points="100,20 120,60 92.5,115 52.5,115" fill="url(#metal1)" />
    
    <!-- Right Leg Block -->
    <polygon class="poly" points="117.5,95 150,80 187.5,155 147.5,155" fill="url(#metal2)" />

    <!-- Bottom Left Block -->
    <polygon class="poly" points="47.5,125 122.5,125 137.5,155 32.5,155" fill="url(#metal3)" />
  </g>
</svg>